<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handbook</title>
  <style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#f8fafc;color:#1a1a2e;min-height:100vh;font-size:16px}
.top-bar{background:#fff;border-bottom:1px solid rgba(0,0,0,.06);padding:.75rem 2rem;position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:1.5rem}
.logo{font-size:1.2rem;font-weight:800;color:#1a1a2e;white-space:nowrap}
.logo span{background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.search-wrap{flex:1;max-width:400px;position:relative}
.search-input{width:100%;padding:.6rem 1rem .6rem 2.4rem;border:1.5px solid rgba(0,0,0,.08);border-radius:8px;font-size:.9rem;outline:none;transition:all .15s;background:#f8fafc}
.search-input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1);background:#fff}
.search-icon{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);width:14px;height:14px;color:#94a3b8}
.search-shortcut{position:absolute;right:.6rem;top:50%;transform:translateY(-50%);font-size:.65rem;color:#94a3b8;background:#f1f3f5;padding:2px 5px;border-radius:3px;border:1px solid rgba(0,0,0,.06)}
.top-stats{font-size:.75rem;color:#94a3b8;white-space:nowrap}
.layout{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:200px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;padding:1.25rem .75rem;border-right:1px solid rgba(0,0,0,.04);background:#fff;flex-shrink:0}
.sidebar-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;padding:.25rem .5rem;margin-bottom:.5rem}
.sidebar a{display:flex;align-items:center;gap:.5rem;padding:.45rem .5rem;border-radius:6px;text-decoration:none;color:#64748b;font-size:.85rem;font-weight:500;transition:all .1s;margin-bottom:2px}
.sidebar a:hover{background:#f0f4ff;color:#4c51bf}
.sidebar a .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sidebar a .cnt{margin-left:auto;font-size:.68rem;color:#94a3b8}
.main-content{flex:1;padding:1.5rem 2rem 4rem;max-width:960px}
.group{margin-bottom:2.5rem}
.group-header{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;padding:.6rem .85rem;background:linear-gradient(135deg,#f8fafc 0%,#f0f4ff 100%);border-radius:10px;border:1px solid rgba(102,126,234,.1)}
.group-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.group-icon svg{width:14px;height:14px;color:#fff}
.group-name{font-size:1.05rem;font-weight:700;color:#1a1a2e}
.group-count{font-size:.72rem;color:#fff;background:#667eea;padding:2px 8px;border-radius:10px;margin-left:auto;font-weight:600}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem}
.card{display:flex;align-items:flex-start;gap:.75rem;padding:.8rem 1rem;background:#fff;border:1px solid rgba(0,0,0,.05);border-radius:8px;text-decoration:none;color:inherit;transition:all .12s;cursor:pointer}
.card:hover{border-color:rgba(102,126,234,.3);box-shadow:0 2px 8px rgba(102,126,234,.08);transform:translateY(-1px)}
.card-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;background:#f1f3f5;border:1px solid rgba(0,0,0,.06)}
.card-icon svg{width:16px;height:16px;color:#475569}
.card-body{flex:1;min-width:0}
.card-title{font-size:.92rem;font-weight:600;color:#1a1a2e;line-height:1.3;margin-bottom:3px}
.card-desc{font-size:.82rem;color:#64748b;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.no-results{text-align:center;padding:3rem;color:#94a3b8;font-size:.88rem;display:none}
@media(max-width:900px){.cards{grid-template-columns:1fr}}
@media(max-width:768px){.sidebar{display:none}.main-content{padding:1rem}.top-bar{padding:.75rem 1rem}}
  </style>
</head>

    var contentEl = document.getElementById("content");
    var noResults = document.getElementById("no-results");
    var searchInput = document.getElementById("search");
    var statsEl = document.getElementById("stats");
    var sidebarEl = document.getElementById("sidebar");
    var totalCount = 0;
    for (var i = 0; i < groups.length; i++) totalCount += groups[i].topics.length;

    function buildSidebar() {
      var html = '<div class="sidebar-title">Nhóm</div>';
      for (var i = 0; i < groups.length; i++) {
        var g = groups[i];
        html += '<a href="#group-' + i + '"><span class="dot" style="background:' + (groupColors[g.name]||'#667eea') + '"></span>' + g.name + '<span class="cnt">' + g.topics.length + '</span></a>';
      }
      sidebarEl.innerHTML = html;
      sidebarEl.querySelectorAll('a').forEach(function(a) {
        a.addEventListener('click', function(e) {
          e.preventDefault();
          var target = document.querySelector(this.getAttribute('href'));
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });
    }

    function render(query) {
      var q = (query || "").toLowerCase();
      var html = "";
      var hasResults = false;
      var visibleCount = 0;

      for (var i = 0; i < groups.length; i++) {
        var group = groups[i];
        var cards = "";
        for (var j = 0; j < group.topics.length; j++) {
          var t = group.topics[j];
          if (q && t.title.toLowerCase().indexOf(q) === -1 && t.desc.toLowerCase().indexOf(q) === -1) continue;
          visibleCount++;
          cards += '<a class="card" href="' + t.url + '">' +
            '<div class="card-icon">' + t.icon + '</div>' +
            '<div class="card-body">' +
            '<div class="card-title">' + t.title + '</div>' +
            '<div class="card-desc">' + t.desc + '</div>' +
            '</div></a>';
        }
        if (cards) {
          hasResults = true;
          var color = groupColors[group.name] || '#667eea';
          var icon = groupIcons[group.name] || '';
          html += '<section class="group" id="group-' + i + '">' +
            '<div class="group-header">' +
            '<div class="group-icon" style="background:' + color + '">' + icon + '</div>' +
            '<span class="group-name">' + group.name + '</span>' +
            '<span class="group-count">' + group.topics.length + '</span>' +
            '</div>' +
            '<div class="cards">' + cards + '</div></section>';
        }
      }

      contentEl.innerHTML = html;
      noResults.style.display = hasResults ? "none" : "block";
      statsEl.textContent = q ? visibleCount + ' kết quả' : totalCount + ' thẻ · ' + groups.length + ' nhóm';
    }

    searchInput.addEventListener("input", function() { render(this.value); });
    document.addEventListener('keydown', function(e) {
      if (e.key === '/' && document.activeElement !== searchInput) { e.preventDefault(); searchInput.focus(); }
      if (e.key === 'Escape') { searchInput.value = ''; render(''); searchInput.blur(); }
    });
    buildSidebar();
    render("");
  </script>
</body>
</html>
